# Runs when this folder is the Git repository root (typical for this Next.js app).
# If you instead commit from a parent monorepo, add a workflow at that repo root with
# `defaults.run.working-directory: gavion-web` and `cache-dependency-path: gavion-web/package-lock.json`.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
